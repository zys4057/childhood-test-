<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>童年印记人格测试</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 页面1：首页 -->
  <div id="page-home" class="page active">
    <div class="home-content">
      <div class="home-icon">🌱</div>
      <h1 class="home-title">童年印记人格测试</h1>
      <p class="home-subtitle">你的童年经历，塑造了怎样的现在？</p>
      <div class="intro-card">
        <div class="intro-card-header">
          <div class="intro-card-icon">🧒</div>
          <h3>童年如何塑造现在的你</h3>
        </div>
        <p class="intro-desc">每个人小时候形成的应对方式，都会影响成年后的行为模式：</p>
        <div class="impact-grid">
          <div class="impact-item">
            <div class="impact-icon">💭</div>
            <div class="impact-text">情绪表达</div>
          </div>
          <div class="impact-item">
            <div class="impact-icon">💕</div>
            <div class="impact-text">亲密关系</div>
          </div>
          <div class="impact-item">
            <div class="impact-icon">🔍</div>
            <div class="impact-text">自我评价</div>
          </div>
          <div class="impact-item">
            <div class="impact-icon">🌊</div>
            <div class="impact-text">压力处理</div>
          </div>
        </div>
      </div>
      <div class="feature-row">
        <div class="feature-item">
          <div class="feature-icon">📋</div>
          <div class="feature-text">40道精选题目</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🧠</div>
          <div class="feature-text">6大维度分析</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">✨</div>
          <div class="feature-text">12种人格类型</div>
        </div>
      </div>
      <p class="notice">本测试不是医学诊断，而是一种自我探索工具。</p>
      <button class="btn btn-primary" onclick="startQuiz()">开始测试</button>
    </div>
  </div>

  <!-- 页面2：测试页 -->
  <div id="page-quiz" class="page">
    <div class="quiz-header">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-text" id="progress-text">第 1 / 40 题</div>
    </div>
    <div class="question-card" id="question-card">
      <div class="question-number" id="question-number">第 1 题</div>
      <div class="question-text" id="question-text">加载中...</div>
      <div class="options" id="options"></div>
    </div>
  </div>

  <!-- 页面3：结果页 -->
  <div id="page-result" class="page">
    <div class="result-content" id="result-content"></div>
  </div>

  <!-- 分享弹窗 -->
  <div id="share-modal" class="share-modal" onclick="closeShare(event)">
    <div class="share-box">
      <h3>分享我的测试结果</h3>
      <div class="share-text" id="share-text"></div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="copyShare()">复制文案</button>
        <button class="btn btn-secondary" onclick="closeShare()">关闭</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
